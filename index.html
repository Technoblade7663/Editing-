
<!DOCTYPE html>
<html>
<head>
<title>Arena Technoblade Style</title>
<style>
  body{margin:0;background:#000;display:flex;flex-direction:column;align-items:center;font-family:Montserrat}
.toolbar{background:#111;width:100%;padding:10px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.toolbar *{padding:8px;border-radius:6px;border:none;font-weight:700}
.toolbar button{background:#FFD700;color:#000;cursor:pointer}
.canvas{width:360px;height:640px;background:#000;position:relative;overflow:hidden;border:3px solid #FFD700;margin:10px}
.text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;text-align:center;color:#FFD700;font-size:48px;font-weight:900;line-height:1.2;opacity:0}
  @keyframes popIn{0%{opacity:0;transform:translate(-50%,-60%) scale(0.9)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.05)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-40%) scale(0.95)}}
</style>
</head>
<body>

<div class="toolbar">
  <input type="file" id="bgm" accept="audio/*"> Upload BGM
  Pause: <input type="range" id="pause" min="0.5" max="3" step="0.5" value="1.5">s
  <button onclick="play()">▶ Play</button>
  <button onclick="record()">● Record 60FPS</button>
  <button onclick="stop()">■ Stop</button>
</div>

<div class="canvas" id="canvas">
  <div class="text" id="text"></div>
</div>

<script>
const lines = [
  "n⁴ + 4, n ∈ N",
  "WHICH IDENTITY?",
  "A) DIFF OF SQUARES",
  "B) SOPHIE GERMAIN",
  "C) AM-GM",
  "D) ALWAYS PRIME",
  "ANSWER IN COMMENTS!"
];

let recorder, chunks=[];
const text = document.getElementById('text');
const canvas = document.getElementById('canvas');
const bgm = new Audio();

document.getElementById('bgm').onchange = e => {
  bgm.src = URL.createObjectURL(e.target.files[0]);
  bgm.volume = 0.25;
  bgm.loop = true;
}

function play(){
  bgm.currentTime = 0; bgm.play();
  let i=0;
  let pause = document.getElementById('pause').value * 1000;
  function next(){
    if(i>=lines.length){bgm.pause();return;}
    text.innerText = lines[i];
    text.style.animation = 'none'; void text.offsetWidth;
    text.style.animation = 'popIn 1.2s ease forwards';
    i++;
    setTimeout(next, 1200 + pause);
  }
  next();
}

function record(){
  chunks=[];
  let stream = canvas.captureStream(60);
  recorder = new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp9',videoBitsPerSecond:12000000});
  recorder.ondataavailable=e=>chunks.push(e.data);
  recorder.onstop=()=>{
    let a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(chunks,{type:'video/webm'}));
    a.download='Arena-Technoblade-60fps.webm';a.click();
  }
  recorder.start(); play();
}
function stop(){recorder.stop(); bgm.pause();}
</script>
</body>
</html>
